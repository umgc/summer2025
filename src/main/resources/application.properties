# App Name
spring.application.name=deeptrain

# Use dynamic port provided by Elastic Beanstalk
server.port=${PORT:5000}

# Optional: Use if you're not ready for DB setup yet
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# PostgreSQL Configuration (remove exclude if using DB)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://your-db-endpoint.amazonaws.com:5432/deeptrain}
spring.datasource.username=${JDBC_DATABASE_USERNAME:deeptrainadmin}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:AbyLove2511}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable CORS for frontend (optional but helpful for Flutter)
# spring.web.cors.allowed-origins=*

# Logging
logging.level.org.springframework=INFO


