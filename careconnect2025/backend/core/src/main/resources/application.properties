    spring.application.name=careconnect-backend

    # Database Configuration
    spring.datasource.url=${JDBC_URI}
    spring.datasource.username=${DB_USER}
    spring.datasource.password=${DB_PASSWORD}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.sql.init.mode=always
    spring.main.banner-mode=off

    # JPA / Hibernate Configuration
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    # Optional: Server port (defaults to 8080)
    # server.port=8080

    spring.mail.host=${MAIL_HOSTNAME}
    spring.mail.port=${MAIL_PORT}
    spring.mail.username=${ADMIN_EMAIL}
    spring.mail.password=${ADMIN_EMAIL_PASSWORD}
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    logging.level.org.springframework.web=DEBUG

    server.servlet.session.cookie.http-only=true
    server.servlet.session.cookie.secure=false

# Enables cross-origin session cookie sharing
    server.servlet.session.cookie.same-site=none

    careconnect.upload.dir=%USERPROFILE%/Documents/uploads
    careconnect.baseurl=