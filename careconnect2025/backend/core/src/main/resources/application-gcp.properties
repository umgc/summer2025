# =============================================================================
# GCP Production Configuration for CareConnect Backend
# =============================================================================

# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration (H2 for Production)
spring.datasource.url=jdbc:h2:file:${H2_DB_PATH:/data/careconnect/db};MODE=${H2_DB_MODE:MIXED};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=careconnect
spring.datasource.password=${H2_DB_PASSWORD:CareConnect2025!}

# H2 Console Configuration (Disabled in Production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.settings.web-allow-others=${H2_WEB_ALLOW_OTHERS:false}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Frontend Configuration
frontend.base-url=${FRONTEND_BASE_URL:https://care-connect-develop.d26kqsucj1bwc1.amplifyapp.com}
careconnect.baseurl=${BACKEND_BASE_URL:https://careconnect-backend-663999888931.us-east1.run.app}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://care-connect-develop.d26kqsucj1bwc1.amplifyapp.com}

# Security Configuration
security.jwt.secret=${JWT_SECRET:CareConnect2025SecureJwtKey256BitSecretForProductionUseOnly!}
security.jwt.expiration=${JWT_EXPIRATION:900000}
security.cookie.secure=${COOKIE_SECURE:true}

# Email Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
email.from=${EMAIL_FROM:noreply@careconnect.com}

# Google OAuth Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}

# Stripe Configuration
stripe.public.key=${STRIPE_PUBLIC_KEY}
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# File Upload Configuration
spring.servlet.multipart.max-file-size=${FILE_UPLOAD_MAX_SIZE:10MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_MAX_SIZE:10MB}
file.upload.path=${FILE_UPLOAD_PATH:/data/careconnect/uploads}
use.s3.for.legacy.endpoints=${USE_S3_FOR_LEGACY_ENDPOINTS:false}

# Actuator Configuration
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when-authorized}
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:true}
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:true}

# Logging Configuration
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.careconnect=${LOGGING_LEVEL_COM_CARECONNECT:INFO}
logging.pattern.console=${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
