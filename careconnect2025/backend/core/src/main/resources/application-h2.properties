# ================================
# CareConnect H2 Database Configuration for Containerized Deployment
# ================================

# Application name
spring.application.name=careconnect-backend

# H2 Database Configuration - Persistent file-based H2
spring.datasource.url=jdbc:h2:file:/app/data/careconnect;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console Configuration (disabled in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=${H2_WEB_ALLOW_OTHERS:false}

# JPA/Hibernate Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Connection Pool Configuration (optimized for H2)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.auto-commit=false

# Performance optimizations for H2
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Disable JPA open-in-view for better performance
spring.jpa.open-in-view=false

# Flyway Configuration - Temporarily disabled to resolve circular dependency
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.careconnect=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.level.com.zaxxer.hikari=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Disable banner for cleaner logs
spring.main.banner-mode=off

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Health Check Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# File Storage Configuration (use local storage in container)
careconnect.upload.dir=/app/uploads
careconnect.file.storage.type=${FILE_STORAGE_TYPE:database}

# Email Configuration
careconnect.email.provider=${EMAIL_PROVIDER:console}
careconnect.email.from=${FROM_EMAIL:noreply@careconnect.app}

# Frontend Configuration
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
careconnect.baseurl=${BACKEND_BASE_URL:http://localhost:8080}
careconnect.cors_allowed=${CORS_ALLOWED_ORIGINS:*}

# Security Configuration
security.jwt.secret=${JWT_SECRET:TXlTZWNyZXRLZXkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.expiration.ms=${JWT_EXPIRATION:10800000}

# OAuth Configuration (optional in H2 mode)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Firebase Configuration (optional)
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:}

# Stripe Configuration (optional)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# AWS S3 Configuration (optional - fallback to database storage)
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.region=${AWS_REGION:us-east-1}
