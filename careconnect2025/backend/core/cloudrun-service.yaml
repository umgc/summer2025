apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: careconnect-backend
  labels:
    app: careconnect-backend
    version: v1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        app: careconnect-backend
        version: v1
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: deployer@careconnectcapstone.iam.gserviceaccount.com
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
      - name: careconnect-backend
        image: us-east1-docker.pkg.dev/careconnectcapstone/careconnect/backend:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "gcp"
        - name: GCP_PROJECT_ID
          value: "careconnectcapstone"
        - name: FRONTEND_BASE_URL
          value: "https://care-connect-develop.d26kqsucj1bwc1.amplifyapp.com"
        - name: BACKEND_BASE_URL
          value: "https://careconnect-backend-663999888931.us-east1.run.app"
        - name: CORS_ALLOWED_ORIGINS
          value: "https://care-connect-develop.d26kqsucj1bwc1.amplifyapp.com,http://localhost:3000"
        - name: H2_DB_PATH
          value: "/data/careconnect/db"
        - name: H2_CONSOLE_ENABLED
          value: "false"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: jwt-secret
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: smtp-username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: smtp-password
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: google-client-secret
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: careconnect-secrets
              key: stripe-secret-key
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: data-volume
          mountPath: /data/careconnect
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: careconnect-data-pvc
  traffic:
  - percent: 100
    latestRevision: true
