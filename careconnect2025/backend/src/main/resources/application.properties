    spring.application.name=careconnect-backend
    spring.config.import=classpath:application-v1.properties,classpath:application-v2.properties

    spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.username=bomplar@gmail.com
    spring.mail.password=
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    logging.level.org.springframework.web=DEBUG

    server.servlet.session.cookie.http-only=true
    server.servlet.session.cookie.secure=false

    springdoc.api-docs.enabled=false
# Enables cross-origin session cookie sharing
    server.servlet.session.cookie.same-site=none

    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true

    spring.profiles.active=@profile@