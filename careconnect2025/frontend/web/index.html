

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Emotion Detection App</title>

    <!-- Load face-api.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>

    <!-- Your emotion detection logic -->
    <script defer src="emotion.js"></script>

    <style>
        body {
          margin: 0;
          background: #111;
          font-family: sans-serif;
          color: white;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        #video-container, #jitsi-container {
          width: 100%;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        video {
          border-radius: 12px;
          box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        #join-button {
          margin-top: 16px;
          padding: 12px 24px;
          font-size: 18px;
          background: #00aaff;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          color: white;
        }
    </style>
</head>
<body>

<!-- Preview screen -->
<div id="video-container">
    <div style="display: flex; flex-direction: column; align-items: center;">
        <video id="emotion-video" width="640" height="480" autoplay muted playsinline></video>
        <button id="join-button" onclick="startJitsiCall()">Join Call</button>
    </div>
</div>

<!-- Jitsi screen -->
<div id="jitsi-container" style="display: none;"></div>

<!-- Flutter compiled app -->
<script src="main.dart.js" type="application/javascript"></script>

<script>
    window.addEventListener('load', async () => {
      const video = document.getElementById('emotion-video');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          startEmotionLoop(video); // From emotion.js
        };
      } catch (err) {
        console.error("Camera access failed:", err);
        alert("Please allow camera access.");
      }
    });

    function startJitsiCall() {
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('jitsi-container').style.display = 'block';

      const domain = "meet.jit.si";
      const options = {
        roomName: "CareConnectRoom",
        parentNode: document.getElementById("jitsi-container"),
        configOverwrite: {
          startWithAudioMuted: false,
          startWithVideoMuted: false
        }
      };

      const api = new JitsiMeetExternalAPI(domain, options);

      api.addEventListener("videoConferenceJoined", () => {
        console.log(" Jitsi joined");
        setTimeout(() => {
          const jitsiVideo = document.querySelector('#jitsi-container video');
          if (jitsiVideo) {
            console.log(" Rebinding emotion detection to Jitsi video");
            startEmotionLoop(jitsiVideo); // Rebind
          } else {
            console.warn(" No Jitsi video found");
          }
        }, 1000);
      });
    }
</script>
</body>
</html>
