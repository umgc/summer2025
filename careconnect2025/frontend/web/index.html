<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Emotion Detection App</title>

  <!-- Load face-api.js from CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>

  <!-- Load your emotion detection logic -->
  <script defer src="emotion.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }

    video {
      margin-top: 16px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    #video-container {
      display: flex;
      justify-content: center;
      width: 100%;
      height: 100vh;
      align-items: center;
    }
  </style>
</head>
<body>
<div id="video-container">
  <video id="emotion-video" width="640" height="480" autoplay muted playsinline></video>
</div>

<!-- Flutter compiled app -->
<script src="main.dart.js" type="application/javascript"></script>

<script>
  // Logging video initialization and stream setup
  window.addEventListener('load', async () => {
    const video = document.getElementById('emotion-video');
    if (!video) {
      console.error("Video element not found!");
      return;
    }

    try {
      console.log("Starting webcam stream...");
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        console.log("Video feed started.");
        video.play();
        startEmotionLoop(video);
      };
    } catch (err) {
      console.error("Failed to access webcam:", err);
      alert("Please grant permission to access the camera.");
    }
  });
</script>
</body>
</html>
